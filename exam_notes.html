<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Exam Notes — Venos Stage A</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f4;--sf:#fff;--sf2:#f0ede8;--bd:#ddd9d2;--bd2:#b8b3aa;
  --tx:#1c1a17;--t2:#4a4540;--t3:#857f77;
  --blu:#1e4db7;--blu-l:#eef2fd;
  --red:#b91c1c;--red-l:#fef2f2;
  --grn:#15803d;--grn-l:#f0fdf4;
  --amb:#b45309;--amb-l:#fffbeb;
  --pur:#6d28d9;--pur-l:#f5f3ff;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:14px;min-height:100vh}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(248,247,244,.92);
  backdrop-filter:blur(12px);border-bottom:1.5px solid var(--bd);
  padding:11px 32px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;background:var(--sf2);color:var(--t2);
  border:1.5px solid var(--bd);border-radius:6px;padding:5px 12px;
  cursor:pointer;text-decoration:none;transition:all .15s}
.back-btn:hover{border-color:var(--blu);color:var(--blu)}
.topbar-brand{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:var(--tx)}
.note-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);
  background:var(--sf2);border:1px solid var(--bd);border-radius:4px;padding:2px 9px}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1a2f5c 0%,#1e3a6e 60%,#1a2f5c 100%);
  color:#fff;padding:44px 40px 36px;border-bottom:4px solid #b91c1c;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.hero-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:10px}
.hero h1{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;
  line-height:1.05;margin-bottom:8px;position:relative}
.hero h1 em{font-style:italic;color:#fde68a}
.hero-sub{font-size:13.5px;color:rgba(255,255,255,.55);margin-bottom:20px}
.hero-stats{display:flex;gap:12px;flex-wrap:wrap;position:relative}
.hstat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:8px;padding:8px 16px;text-align:center}
.hstat-n{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#fde68a}
.hstat-l{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.4);margin-top:1px}

/* ── ADD FORM ── */
.main-wrap{max-width:920px;margin:0 auto;padding:36px 32px 80px}
.add-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;
  padding:24px;margin-bottom:32px;box-shadow:0 2px 12px rgba(0,0,0,.05);
  transition:border-color .2s}
.add-card:focus-within{border-color:var(--pur)}
.add-card-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px;
  padding-bottom:14px;border-bottom:1.5px solid var(--bd)}
.add-card-hd h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--tx)}
.add-card-hd span{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);
  letter-spacing:.1em;text-transform:uppercase}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}
.form-group label{display:block;font-family:'JetBrains Mono',monospace;font-size:8.5px;
  font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:var(--sf2);border:1.5px solid var(--bd);border-radius:7px;
  color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:13.5px;
  padding:9px 12px;outline:none;transition:border-color .15s,box-shadow .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--pur);box-shadow:0 0 0 3px rgba(109,40,217,.08);background:var(--sf)}
.form-group textarea{resize:vertical;min-height:90px;line-height:1.65}
.form-group select{cursor:pointer}

/* autocomplete suggestions */
.suggestions{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.sug-btn{font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 8px;
  border-radius:4px;border:1px solid var(--bd);color:var(--t3);cursor:pointer;
  background:var(--sf2);transition:all .12s}
.sug-btn:hover{border-color:var(--pur);color:var(--pur);background:var(--pur-l)}

/* image upload */
.img-upload-area{border:2px dashed var(--bd);border-radius:8px;padding:16px;
  text-align:center;cursor:pointer;transition:all .2s;background:var(--sf2)}
.img-upload-area:hover{border-color:var(--pur);background:var(--pur-l)}
.img-upload-area input{display:none}
.img-upload-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--t3);cursor:pointer;display:block}
.img-preview{margin-top:10px;display:none}
.img-preview img{max-width:100%;max-height:180px;border-radius:6px;border:1.5px solid var(--bd)}
.img-remove{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--red);
  background:none;border:none;cursor:pointer;margin-top:5px;letter-spacing:.08em}

.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:14px;
  border-top:1px solid var(--bd);margin-top:4px}
.btn-save{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;background:var(--pur);color:#fff;
  border:none;border-radius:7px;padding:9px 22px;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#5b21b6}
.btn-clr{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;background:var(--sf2);color:var(--t2);
  border:1.5px solid var(--bd);border-radius:7px;padding:9px 16px;cursor:pointer}
.shortcut{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--t3);
  margin-right:auto;align-self:center}

/* ── FILTER BAR ── */
.filter-bar{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;
  padding:14px 18px;margin-bottom:24px}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filter-row:last-child{margin-bottom:0}
.filter-label{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;color:var(--t3);flex-shrink:0;width:60px}
.f-btn{font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:4px 11px;
  border-radius:5px;border:1.5px solid var(--bd);color:var(--t2);cursor:pointer;
  background:var(--sf2);transition:all .12s;white-space:nowrap}
.f-btn:hover{border-color:var(--blu);color:var(--blu)}
.f-btn.active{background:var(--blu-l);border-color:var(--blu);color:var(--blu);font-weight:500}
.search-inp{flex:1;min-width:160px;background:var(--sf2);border:1.5px solid var(--bd);
  border-radius:6px;color:var(--tx);font-family:'Source Sans 3',sans-serif;
  font-size:13px;padding:6px 12px;outline:none}
.search-inp:focus{border-color:var(--pur)}
.sort-sel{background:var(--sf2);border:1.5px solid var(--bd);border-radius:6px;
  color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:8.5px;
  padding:5px 8px;outline:none;cursor:pointer}

/* topic tags */
.topic-tags{display:flex;flex-wrap:wrap;gap:5px}
.t-tag{font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 9px;
  border-radius:4px;border:1.5px solid var(--bd);color:var(--t3);cursor:pointer;
  background:var(--sf2);transition:all .12s}
.t-tag:hover{border-color:var(--pur);color:var(--pur)}
.t-tag.active{background:var(--pur-l);border-color:var(--pur);color:var(--pur);font-weight:500}

/* ── NOTES ── */
.section-hd{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;color:var(--t3);
  margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

.note-card{background:var(--sf);border:1.5px solid var(--bd);border-radius:10px;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 1px 6px rgba(0,0,0,.04);transition:box-shadow .15s,border-color .15s}
.note-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.08);border-color:var(--bd2)}

.note-card-top{padding:14px 16px 10px;flex:1}
.note-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.badge-subj{font-family:'JetBrains Mono',monospace;font-size:7.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;border-radius:4px;padding:2px 7px}
.badge-topic{font-family:'JetBrains Mono',monospace;font-size:7.5px;
  border-radius:4px;padding:2px 7px;background:var(--pur-l);color:var(--pur);
  cursor:pointer;border:1px solid #ddd6fe;transition:background .12s}
.badge-topic:hover{background:#ede9fe}
.note-text{font-size:13px;color:var(--t2);line-height:1.65;white-space:pre-wrap;margin-bottom:8px}
.note-img{width:100%;border-radius:6px;border:1px solid var(--bd);margin-top:6px;
  max-height:200px;object-fit:cover;cursor:pointer}
.note-img:hover{opacity:.9}

.note-card-foot{padding:8px 16px;border-top:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;background:var(--sf2)}
.note-date{font-family:'JetBrains Mono',monospace;font-size:7.5px;color:var(--t3)}
.note-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;
  padding:2px 4px;border-radius:3px;transition:color .12s}
.note-del:hover{color:var(--red)}

/* empty state */
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--t3)}
.empty-state .ei{font-size:42px;margin-bottom:14px}
.empty-state p{font-family:'JetBrains Mono',monospace;font-size:9.5px;
  letter-spacing:.1em;text-transform:uppercase}

/* subject color badges */
.sc-cardiology{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5}
.sc-rheumatology{background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe}
.sc-nephrology{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.sc-infectious{background:#f0fdf4;color:#15803d;border:1px solid #86efac}
.sc-respiratory{background:#ecfeff;color:#0e7490;border:1px solid #a5f3fc}
.sc-hematology{background:#fff1f2;color:#be123c;border:1px solid #fda4af}
.sc-endocrinology{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.sc-gastroenterology{background:#f0fdf4;color:#065f46;border:1px solid #6ee7b7}
.sc-hepatology{background:#fff7ed;color:#c2410c;border:1px solid #fdba74}
.sc-general{background:#f9fafb;color:#374151;border:1px solid #d1d5db}

/* stats pills */
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.stat-pill{background:var(--sf);border:1.5px solid var(--bd);border-radius:6px;
  padding:5px 13px;font-family:'JetBrains Mono',monospace;font-size:8px;
  letter-spacing:.06em;text-transform:uppercase;color:var(--t2)}
.stat-pill b{color:var(--blu);font-weight:600}

/* image lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:9999;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px}

.fmt-bar{display:flex;gap:5px;margin-bottom:5px}
.fmt-btn{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  width:26px;height:26px;border:1.5px solid var(--bd);border-radius:5px;
  background:var(--sf2);color:var(--t2);cursor:pointer;transition:all .12s;
  display:flex;align-items:center;justify-content:center}
.fmt-btn:hover{border-color:var(--pur);color:var(--pur);background:var(--pur-l)}
</style>
</head>
<body>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightbox-img" src="">
</div>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">← Hub</a>
    <div class="topbar-brand">📋 Exam Notes</div>
  </div>
  <div class="note-count" id="note-count">0 notes</div>
</div>

<div class="hero">
  <div class="hero-badge">Stage A · Internal Medicine · Boards Prep</div>
  <h1>Exam <em>Notes</em></h1>
  <p class="hero-sub">Capture key learning points from practice questions — by subject, by topic.</p>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-n" id="stat-total">0</div><div class="hstat-l">Total Notes</div></div>
    <div class="hstat"><div class="hstat-n" id="stat-topics">0</div><div class="hstat-l">Topics</div></div>
    <div class="hstat"><div class="hstat-n" id="stat-subjs">0</div><div class="hstat-l">Subjects</div></div>
  </div>
</div>

<div class="main-wrap">

  <!-- ADD CARD -->
  <div class="add-card">
    <div class="add-card-hd">
      <h2>Add Note</h2>
      <span>Ctrl + Enter to save quickly</span>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Subject</label>
        <select id="inp-subject">
          <option value="cardiology">❤️ Cardiology</option>
          <option value="rheumatology">🦴 Rheumatology</option>
          <option value="nephrology">🫘 Nephrology</option>
          <option value="infectious">🦠 Infectious Disease</option>
          <option value="respiratory">🫁 Respiratory</option>
          <option value="hematology">🩸 Hematology</option>
          <option value="endocrinology">⚗️ Endocrinology</option>
          <option value="gastroenterology">🫄 Gastroenterology</option>
          <option value="hepatology">🫀 Hepatology</option>
          <option value="general">📌 General</option>
        </select>
      </div>
      <div class="form-group">
        <label>Topic Tag <span style="color:var(--t3);font-size:7px">(e.g. COPD, Gout, AKI)</span></label>
        <input type="text" id="inp-topic" placeholder="Type topic…" oninput="updateSug()" autocomplete="off">
        <div class="suggestions" id="sug-row"></div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Note</label>
      <div class="fmt-bar"><button class="fmt-btn" type="button" onclick="fmtBold()" title="Bold selected text"><b>B</b></button></div>
      <textarea id="inp-note" placeholder="Key learning point, correction, or important fact…"></textarea>
    </div>
    <div class="form-group">
      <label>Image <span style="color:var(--t3);font-size:7px">(optional — paste or upload)</span></label>
      <div class="img-upload-area" onclick="document.getElementById('img-file').click()"
           ondragover="event.preventDefault()" ondrop="handleDrop(event)">
        <input type="file" id="img-file" accept="image/*" onchange="handleFile(this.files[0])">
        <label class="img-upload-label">📎 Click to upload or drag & drop an image</label>
        <div class="img-preview" id="img-preview">
          <img id="img-prev-el" src="">
          <div><button class="img-remove" onclick="event.stopPropagation();removeImg()">✕ Remove image</button></div>
        </div>
      </div>
    </div>
    <div class="form-actions">
      <span class="shortcut">Ctrl+Enter to save</span>
      <button class="btn-clr" onclick="clearForm()">Clear</button>
      <button class="btn-save" onclick="addNote()">+ Save Note</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-label">Subject</span>
      <button class="f-btn active" onclick="setSubj('all',this)">All</button>
      <button class="f-btn" onclick="setSubj('cardiology',this)">❤️ Cardiology</button>
      <button class="f-btn" onclick="setSubj('rheumatology',this)">🦴 Rheumatology</button>
      <button class="f-btn" onclick="setSubj('nephrology',this)">🫘 Nephrology</button>
      <button class="f-btn" onclick="setSubj('infectious',this)">🦠 Infectious</button>
      <button class="f-btn" onclick="setSubj('respiratory',this)">🫁 Respiratory</button>
      <button class="f-btn" onclick="setSubj('hematology',this)">🩸 Hematology</button>
      <button class="f-btn" onclick="setSubj('endocrinology',this)">⚗️ Endocrine</button>
      <button class="f-btn" onclick="setSubj('gastroenterology',this)">🫄 Gastro</button>
      <button class="f-btn" onclick="setSubj('hepatology',this)">🫀 Hepatology</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Topic</span>
      <div class="topic-tags" id="topic-tags"></div>
    </div>
    <div class="filter-row" style="margin-top:4px">
      <span class="filter-label">Search</span>
      <input class="search-inp" type="text" placeholder="Search notes…" id="search-inp" oninput="render()">
      <select class="sort-sel" id="sort-sel" onchange="render()">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="subject">By subject</option>
        <option value="topic">By topic</option>
      </select>
    </div>
  </div>

  <!-- NOTES GRID -->
  <div class="section-hd" id="notes-hd">All Notes</div>
  <div id="notes-grid" class="notes-grid"></div>
</div>

<script>
const KEY = 'venos_exam_notes_v3';
let activeSubj = 'all', activeTopic = 'all', pendingImg = null;

const SUBJ = {
  cardiology:      {label:'Cardiology',      emoji:'❤️'},
  rheumatology:    {label:'Rheumatology',    emoji:'🦴'},
  nephrology:      {label:'Nephrology',      emoji:'🫘'},
  infectious:      {label:'Infectious',      emoji:'🦠'},
  respiratory:     {label:'Respiratory',     emoji:'🫁'},
  hematology:      {label:'Hematology',      emoji:'🩸'},
  endocrinology:   {label:'Endocrinology',   emoji:'⚗️'},
  gastroenterology:{label:'Gastro',          emoji:'🫄'},
  hepatology:      {label:'Hepatology',      emoji:'🫀'},
  general:         {label:'General',         emoji:'📌'},
};

function getNotes(){try{return JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){return[];}}
function saveNotes(n){try{localStorage.setItem(KEY,JSON.stringify(n));}catch(e){}}

/* ── IMAGE HANDLING ── */
function compressImg(file, cb){
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 700;
      let w=img.width, h=img.height;
      if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}
      if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.65));
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function handleFile(file){if(!file)return; compressImg(file, showPreview);}
function handleDrop(e){e.preventDefault(); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) handleFile(f);}
function showPreview(src){
  pendingImg = src;
  document.getElementById('img-prev-el').src = src;
  document.getElementById('img-preview').style.display = 'block';
}
function removeImg(){
  pendingImg = null;
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('img-prev-el').src = '';
  document.getElementById('img-file').value = '';
}
// Paste image
document.addEventListener('paste', function(e){
  const items = e.clipboardData?.items;
  if(!items) return;
  for(let i=0; i<items.length; i++){
    if(items[i].type.startsWith('image/')){
      compressImg(items[i].getAsFile(), showPreview);
      break;
    }
  }
});

/* ── ADD NOTE ── */
function addNote(){
  const subj  = document.getElementById('inp-subject').value;
  const topic = document.getElementById('inp-topic').value.trim();
  const text  = document.getElementById('inp-note').value.trim();
  if(!text){document.getElementById('inp-note').focus();return;}
  const notes = getNotes();
  const note = {
    id: Date.now(), subject: subj,
    topic: topic || 'General', text,
    date: new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
  };
  if(pendingImg) note.img = pendingImg;
  notes.unshift(note);
  saveNotes(notes);
  clearForm();
  render();
}
function clearForm(){
  document.getElementById('inp-topic').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('sug-row').innerHTML='';
  removeImg();
}

/* ── FILTERS ── */
function setSubj(s,btn){
  activeSubj=s;
  document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setTopic(t){
  activeTopic = activeTopic===t ? 'all' : t;
  render();
}
function deleteNote(id){
  if(!confirm('Delete this note?'))return;
  saveNotes(getNotes().filter(n=>n.id!==id));
  render();
}
function openLightbox(src){
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('show');
}

/* ── AUTOCOMPLETE ── */
function updateSug(){
  const val = document.getElementById('inp-topic').value.toLowerCase().trim();
  const topics = getTopics();
  const sugRow = document.getElementById('sug-row');
  if(!val){sugRow.innerHTML='';return;}
  const matches = topics.filter(t=>t.toLowerCase().includes(val)&&t.toLowerCase()!==val);
  sugRow.innerHTML = matches.slice(0,7).map(t=>
    `<button class="sug-btn" onclick="document.getElementById('inp-topic').value='${t.replace(/'/g,"\\'")}';document.getElementById('sug-row').innerHTML=''">${t}</button>`
  ).join('');
}
function getTopics(){
  const set=new Set();
  getNotes().forEach(n=>{if(n.topic&&n.topic!=='General')set.add(n.topic);});
  return [...set].sort();
}

/* ── RENDER ── */
function render(){
  const q    = document.getElementById('search-inp').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;
  const all  = getNotes();

  // Stats
  const topicSet=new Set(), subjSet=new Set();
  all.forEach(n=>{topicSet.add(n.topic);subjSet.add(n.subject);});
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-topics').textContent = topicSet.size;
  document.getElementById('stat-subjs').textContent = subjSet.size;
  document.getElementById('note-count').textContent = all.length + ' note'+(all.length!==1?'s':'');

  // Stat pills
  const counts={};
  all.forEach(n=>{counts[n.subject]=(counts[n.subject]||0)+1;});
  document.getElementById('stats-row').innerHTML = Object.entries(counts)
    .sort((a,b)=>b[1]-a[1])
    .map(([s,c])=>`<div class="stat-pill">${SUBJ[s]?.emoji||''} ${SUBJ[s]?.label||s} <b>${c}</b></div>`)
    .join('');

  // Topic tags
  const topics = getTopics();
  document.getElementById('topic-tags').innerHTML =
    `<button class="t-tag ${activeTopic==='all'?'active':''}" onclick="setTopic('all')">All Topics</button>` +
    topics.map(t=>`<button class="t-tag ${activeTopic===t?'active':''}" onclick="setTopic('${t.replace(/'/g,"\\'")}')">#${t}</button>`).join('');

  // Filter
  let notes = all;
  if(activeSubj!=='all') notes=notes.filter(n=>n.subject===activeSubj);
  if(activeTopic!=='all') notes=notes.filter(n=>n.topic===activeTopic);
  if(q) notes=notes.filter(n=>
    n.text.toLowerCase().includes(q)||
    n.topic.toLowerCase().includes(q)||
    (SUBJ[n.subject]?.label||'').toLowerCase().includes(q)
  );

  // Sort
  if(sort==='oldest') notes=[...notes].reverse();
  if(sort==='subject') notes=[...notes].sort((a,b)=>a.subject.localeCompare(b.subject));
  if(sort==='topic') notes=[...notes].sort((a,b)=>a.topic.localeCompare(b.topic));

  // Header
  const hd = document.getElementById('notes-hd');
  hd.textContent = notes.length + ' Note' + (notes.length!==1?'s':'') +
    (activeSubj!=='all'?' · '+SUBJ[activeSubj]?.label:'') +
    (activeTopic!=='all'?' · #'+activeTopic:'') +
    (q?' · "'+q+'"':'');

  // Grid
  const grid = document.getElementById('notes-grid');
  if(!notes.length){
    grid.innerHTML=`<div class="empty-state"><div class="ei">📋</div>
      <p>${q||activeSubj!=='all'||activeTopic!=='all'?'No notes match your filter':'No notes yet — add your first one above'}</p></div>`;
    return;
  }

  grid.innerHTML = notes.map(note=>`
    <div class="note-card">
      <div class="note-card-top">
        <div class="note-badges">
          <span class="badge-subj sc-${note.subject}">${SUBJ[note.subject]?.emoji||''} ${SUBJ[note.subject]?.label||note.subject}</span>
          ${note.topic&&note.topic!=='General'?`<button class="badge-topic" onclick="setTopic('${note.topic.replace(/'/g,"\\'")}')">#${note.topic}</button>`:''}
        </div>
        <div class="note-text">${note.text.replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong></strong>')}</div>
        ${note.img?`<img class="note-img" src="${note.img}" onclick="openLightbox('${note.img}')" title="Click to enlarge">`:''}
      </div>
      <div class="note-card-foot">
        <span class="note-date">${note.date}</span>
        <button class="note-del" onclick="deleteNote(${note.id})" title="Delete">🗑</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('inp-note').addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)addNote();});
function fmtBold(){
  const ta = document.getElementById('inp-note');
  const start = ta.selectionStart, end = ta.selectionEnd;
  if(start===end){ta.focus();return;}
  const sel = ta.value.substring(start, end);
  const before = ta.value.substring(0, start);
  const after = ta.value.substring(end);
  ta.value = before + '**' + sel + '**' + after;
  ta.setSelectionRange(start, end+4);
  ta.focus();
}
render();
</script>
</body>
