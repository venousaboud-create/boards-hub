<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Exam Notes — Venos Stage A</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;
  --tx:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --acc:#58a6ff;--grn:#3fb950;--red:#f85149;--amb:#d29922;--pur:#a371f7;
}
body{background:var(--bg);color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:14px;min-height:100vh}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bd);padding:12px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;background:var(--bg3);color:var(--t2);border:1px solid var(--bd);
  border-radius:6px;padding:5px 12px;cursor:pointer;text-decoration:none;transition:all .15s}
.back-btn:hover{border-color:var(--acc);color:var(--acc)}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--tx)}
.note-count{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);
  background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:2px 8px}

/* HERO */
.hero{padding:40px 28px 28px;max-width:900px;margin:0 auto}
.hero h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;
  line-height:1.1;margin-bottom:8px}
.hero h1 em{font-style:italic;color:var(--acc)}
.hero p{color:var(--t2);font-size:14px}

/* ADD NOTE FORM */
.add-section{max-width:900px;margin:0 auto;padding:0 28px 28px}
.add-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:20px;
  transition:border-color .2s}
.add-card:focus-within{border-color:rgba(88,166,255,.4)}
.add-card-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;color:var(--t2);margin-bottom:14px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.form-group label{display:block;font-family:'JetBrains Mono',monospace;font-size:8.5px;
  font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:13px;
  padding:8px 12px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--acc)}
.form-group select option{background:var(--bg3)}
.form-group textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:12px}
.btn-add{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;background:var(--acc);color:#0d1117;
  border:none;border-radius:6px;padding:8px 20px;cursor:pointer;transition:opacity .15s}
.btn-add:hover{opacity:.85}
.btn-clear-form{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;background:var(--bg3);color:var(--t2);
  border:1px solid var(--bd);border-radius:6px;padding:8px 16px;cursor:pointer}

/* FILTERS */
.filters{max-width:900px;margin:0 auto;padding:0 28px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;
  color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:13px;padding:7px 12px;outline:none}
.search-box:focus{border-color:var(--acc)}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;background:var(--bg2);color:var(--t2);
  border:1px solid var(--bd);border-radius:6px;padding:6px 12px;cursor:pointer;transition:all .15s}
.filter-btn:hover,.filter-btn.active{background:rgba(88,166,255,.1);border-color:rgba(88,166,255,.3);color:var(--acc)}
.sort-select{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;
  color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:8.5px;padding:6px 10px;outline:none}

/* NOTES GRID */
.notes-section{max-width:900px;margin:0 auto;padding:0 28px 80px}
.notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.empty-state{text-align:center;padding:60px 20px;color:var(--t3)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase}

/* NOTE CARD */
.note-card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;
  overflow:hidden;transition:border-color .15s;display:flex;flex-direction:column}
.note-card:hover{border-color:rgba(88,166,255,.25)}
.note-card-top{padding:12px 14px 8px;flex:1}
.note-subject{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:500;
  letter-spacing:.12em;text-transform:uppercase;border-radius:3px;padding:2px 7px;
  display:inline-block;margin-bottom:8px}
.note-topic{font-size:12px;font-weight:600;color:var(--tx);margin-bottom:6px;line-height:1.4}
.note-text{font-size:12.5px;color:var(--t2);line-height:1.6;white-space:pre-wrap}
.note-card-bottom{padding:8px 14px;border-top:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between}
.note-date{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--t3)}
.note-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;
  padding:2px 4px;border-radius:3px;transition:color .15s}
.note-del:hover{color:var(--red)}

/* SUBJECT COLORS */
.subj-cardiology{background:rgba(248,81,73,.12);color:#f87171}
.subj-rheumatology{background:rgba(163,113,247,.12);color:#c084fc}
.subj-nephrology{background:rgba(88,166,255,.12);color:#60a5fa}
.subj-infectious{background:rgba(63,185,80,.12);color:#4ade80}
.subj-respiratory{background:rgba(14,165,233,.12);color:#38bdf8}
.subj-hematology{background:rgba(251,113,133,.12);color:#fb7185}
.subj-endocrinology{background:rgba(251,191,36,.12);color:#fbbf24}
.subj-gastroenterology{background:rgba(52,211,153,.12);color:#34d399}
.subj-hepatology{background:rgba(251,146,60,.12);color:#fb923c}
.subj-general{background:rgba(139,148,158,.12);color:#8b949e}

/* STATS */
.stats-row{max-width:900px;margin:0 auto;padding:0 28px 20px;display:flex;gap:10px;flex-wrap:wrap}
.stat-pill{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;
  padding:6px 14px;font-family:'JetBrains Mono',monospace;font-size:8.5px;
  letter-spacing:.08em;text-transform:uppercase;color:var(--t2)}
.stat-pill span{color:var(--acc);font-weight:500}

.section-header{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--bd)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="back-btn" href="index.html">← Hub</a>
    <div class="topbar-title">📋 Exam Notes</div>
  </div>
  <div class="note-count" id="note-count">0 notes</div>
</div>

<div class="hero">
  <h1>Exam <em>Notes</em></h1>
  <p>Capture key points from practice questions — organized by subject, searchable, always saved.</p>
</div>

<div class="add-section">
  <div class="add-card">
    <div class="add-card-title">+ Add New Note</div>
    <div class="form-row">
      <div class="form-group">
        <label>Subject</label>
        <select id="inp-subject">
          <option value="cardiology">❤️ Cardiology</option>
          <option value="rheumatology">🦴 Rheumatology</option>
          <option value="nephrology">🫘 Nephrology</option>
          <option value="infectious">🦠 Infectious Disease</option>
          <option value="respiratory">🫁 Respiratory</option>
          <option value="hematology">🩸 Hematology</option>
          <option value="endocrinology">⚗️ Endocrinology</option>
          <option value="gastroenterology">🫄 Gastroenterology</option>
          <option value="hepatology">🫀 Hepatology</option>
          <option value="general">📌 General</option>
        </select>
      </div>
      <div class="form-group">
        <label>Topic / Question Tag</label>
        <input type="text" id="inp-topic" placeholder="e.g. NSTEMI timing, Gout treatment…">
      </div>
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="inp-note" placeholder="Write your key learning point, correction, or important fact…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-clear-form" onclick="clearForm()">Clear</button>
      <button class="btn-add" onclick="addNote()">+ Save Note</button>
    </div>
  </div>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="filters">
  <input class="search-box" type="text" placeholder="🔍 Search notes…" id="search-inp" oninput="render()">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('cardiology',this)">❤️</button>
  <button class="filter-btn" onclick="setFilter('rheumatology',this)">🦴</button>
  <button class="filter-btn" onclick="setFilter('nephrology',this)">🫘</button>
  <button class="filter-btn" onclick="setFilter('infectious',this)">🦠</button>
  <button class="filter-btn" onclick="setFilter('respiratory',this)">🫁</button>
  <button class="filter-btn" onclick="setFilter('hematology',this)">🩸</button>
  <button class="filter-btn" onclick="setFilter('endocrinology',this)">⚗️</button>
  <button class="filter-btn" onclick="setFilter('gastroenterology',this)">🫄</button>
  <button class="filter-btn" onclick="setFilter('hepatology',this)">🫀</button>
  <select class="sort-select" id="sort-sel" onchange="render()">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="subject">By subject</option>
  </select>
</div>

<div class="notes-section">
  <div id="notes-grid" class="notes-grid"></div>
</div>

<script>
const KEY = 'venos_exam_notes_v1';
let activeFilter = 'all';

const SUBJECTS = {
  cardiology:      { label: 'Cardiology',      emoji: '❤️' },
  rheumatology:    { label: 'Rheumatology',    emoji: '🦴' },
  nephrology:      { label: 'Nephrology',      emoji: '🫘' },
  infectious:      { label: 'Infectious',      emoji: '🦠' },
  respiratory:     { label: 'Respiratory',     emoji: '🫁' },
  hematology:      { label: 'Hematology',      emoji: '🩸' },
  endocrinology:   { label: 'Endocrinology',   emoji: '⚗️' },
  gastroenterology:{ label: 'Gastro',          emoji: '🫄' },
  hepatology:      { label: 'Hepatology',      emoji: '🫀' },
  general:         { label: 'General',         emoji: '📌' },
};

function getNotes() {
  try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { return []; }
}
function saveNotes(n) {
  try { localStorage.setItem(KEY, JSON.stringify(n)); } catch(e) {}
}

function addNote() {
  const subject = document.getElementById('inp-subject').value;
  const topic   = document.getElementById('inp-topic').value.trim();
  const text    = document.getElementById('inp-note').value.trim();
  if (!text) { document.getElementById('inp-note').focus(); return; }
  const notes = getNotes();
  notes.unshift({
    id: Date.now(),
    subject,
    topic: topic || '—',
    text,
    date: new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})
  });
  saveNotes(notes);
  clearForm();
  render();
}

function clearForm() {
  document.getElementById('inp-topic').value = '';
  document.getElementById('inp-note').value = '';
}

function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  saveNotes(getNotes().filter(n => n.id !== id));
  render();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q    = document.getElementById('search-inp').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;
  let notes  = getNotes();

  // Filter
  if (activeFilter !== 'all') notes = notes.filter(n => n.subject === activeFilter);
  if (q) notes = notes.filter(n =>
    n.text.toLowerCase().includes(q) ||
    n.topic.toLowerCase().includes(q) ||
    (SUBJECTS[n.subject]?.label || '').toLowerCase().includes(q)
  );

  // Sort
  if (sort === 'oldest') notes = [...notes].reverse();
  if (sort === 'subject') notes = [...notes].sort((a,b) => a.subject.localeCompare(b.subject));

  // Update count
  const all = getNotes();
  document.getElementById('note-count').textContent = all.length + ' note' + (all.length !== 1 ? 's' : '');

  // Stats
  const statsRow = document.getElementById('stats-row');
  const counts = {};
  all.forEach(n => { counts[n.subject] = (counts[n.subject] || 0) + 1; });
  statsRow.innerHTML = Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .map(([s,c]) => `<div class="stat-pill">${SUBJECTS[s]?.emoji || ''} ${SUBJECTS[s]?.label || s}: <span>${c}</span></div>`)
    .join('');

  // Grid
  const grid = document.getElementById('notes-grid');
  if (!notes.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📋</div>
      <p>${q || activeFilter !== 'all' ? 'No notes match your filter' : 'No notes yet — add your first one above'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = notes.map(note => `
    <div class="note-card">
      <div class="note-card-top">
        <span class="note-subject subj-${note.subject}">${SUBJECTS[note.subject]?.emoji || ''} ${SUBJECTS[note.subject]?.label || note.subject}</span>
        ${note.topic !== '—' ? `<div class="note-topic">${note.topic}</div>` : ''}
        <div class="note-text">${note.text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      </div>
      <div class="note-card-bottom">
        <span class="note-date">${note.date}</span>
        <button class="note-del" onclick="deleteNote(${note.id})" title="Delete">🗑</button>
      </div>
    </div>
  `).join('');
}

// Enter to save
document.getElementById('inp-note').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) addNote();
});

render();
</script>
</body>
</html>
