<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Boards Study Hub — Stage A Internal Medicine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;
  --tx:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --acc:#58a6ff;--acc2:#1f6feb;
  --red:#f85149;--grn:#3fb950;--amb:#d29922;--pur:#a371f7;
}
body{background:var(--bg);color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:14px;line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 800px 600px at 20% 10%,rgba(31,111,235,.07) 0%,transparent 70%),
             radial-gradient(ellipse 600px 400px at 80% 80%,rgba(163,113,247,.05) 0%,transparent 70%);
  pointer-events:none;z-index:0}

/* TOP BAR */
.topbar{position:sticky;top:0;z-index:200;background:rgba(13,17,23,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--bd);padding:11px 28px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--t2);display:flex;align-items:center;gap:8px}
.topbar-brand span{font-size:18px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-pill{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;background:rgba(88,166,255,.1);color:var(--acc);border:1px solid rgba(88,166,255,.25);border-radius:20px;padding:3px 12px}
#edit-toggle-btn{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:var(--bg3);color:var(--t2);border:1px solid var(--bd);border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .15s}
#edit-toggle-btn:hover{border-color:var(--acc);color:var(--acc)}
#edit-toggle-btn.active{background:rgba(63,185,80,.1);color:var(--grn);border-color:rgba(63,185,80,.3)}

/* HERO */
.hero{position:relative;z-index:1;padding:60px 28px 44px;text-align:center;max-width:680px;margin:0 auto}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,58px);font-weight:900;line-height:1.0;margin-bottom:10px;letter-spacing:-.02em}
.hero h1 em{font-style:italic;color:var(--acc)}
.hero-name{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.25em;text-transform:uppercase;color:var(--t3);margin-bottom:20px}
.hero-sub{font-size:14px;color:var(--t2);margin-bottom:28px}
.hero-stats{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.hstat{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:9px 18px;text-align:center}
.hstat-n{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--acc);line-height:1;margin-bottom:2px}
.hstat-l{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}

/* SEARCH */
.search-wrap{position:relative;z-index:1;max-width:500px;margin:0 auto 36px;padding:0 28px}
.search-icon{position:absolute;left:44px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}
.search-box{width:100%;padding:10px 14px 10px 38px;background:var(--bg2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:13.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.search-box:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(88,166,255,.1)}
.search-box::placeholder{color:var(--t3)}

/* SUBJECTS */
.subjects{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:0 20px 80px;display:flex;flex-direction:column;gap:8px}
.subject{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;transition:border-color .2s}
.subject:hover{border-color:rgba(88,166,255,.25)}
.subject.open{border-color:rgba(88,166,255,.35)}
.subject.hidden-search{display:none}

.subject-hd{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.subject-hd:hover{background:rgba(255,255,255,.02)}
.subject-icon{font-size:18px;flex-shrink:0;width:34px;height:34px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;display:flex;align-items:center;justify-content:center}
.subject-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;flex:1}
.topic-count{font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:2px 8px}
.topic-count.has{color:var(--acc);border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.06)}
.chevron{color:var(--t3);font-size:11px;transition:transform .2s;font-family:'JetBrains Mono',monospace}
.subject.open .chevron{transform:rotate(180deg);color:var(--acc)}

/* TOPICS */
.topics{display:none;border-top:1px solid var(--bd);padding:10px 14px;flex-direction:column;gap:3px}
.subject.open .topics{display:flex}
.topic-link{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:6px;text-decoration:none;color:var(--t2);font-size:13px;transition:background .12s,color .12s;border:1px solid transparent}
.topic-link:hover{background:rgba(88,166,255,.07);color:var(--acc);border-color:rgba(88,166,255,.15)}
.topic-link::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0;opacity:.4}
.topic-link:hover::before{opacity:1}
.tl-name{flex:1}
.tl-badge{font-family:'JetBrains Mono',monospace;font-size:7.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--grn);background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);border-radius:3px;padding:1px 6px;flex-shrink:0}
.empty-topics{padding:12px 11px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3)}

/* ── EDIT MODE UI ── */
.edit-bar{display:none;background:rgba(63,185,80,.06);border-top:1px solid rgba(63,185,80,.2);padding:10px 14px;gap:8px;align-items:center;flex-wrap:wrap}
.subject.open .edit-bar{display:flex}
.edit-bar input,.edit-bar select{background:var(--bg3);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'Source Sans 3',sans-serif;font-size:12.5px;padding:6px 10px;outline:none;transition:border-color .15s}
.edit-bar input:focus,.edit-bar select:focus{border-color:var(--grn)}
.edit-bar input.inp-name{flex:1;min-width:160px}
.edit-bar input.inp-file{flex:1;min-width:160px;font-family:'JetBrains Mono',monospace;font-size:11px}
.btn-add{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:rgba(63,185,80,.15);color:var(--grn);border:1px solid rgba(63,185,80,.3);border-radius:6px;padding:6px 14px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-add:hover{background:rgba(63,185,80,.25)}
.del-btn{opacity:0;margin-left:auto;font-size:15px;background:none;border:none;color:var(--red);cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1;transition:opacity .15s}
.topic-link:hover .del-btn{opacity:1}
.edit-mode .del-btn{opacity:.5}
.edit-mode .del-btn:hover{opacity:1}

/* PASSWORD MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:28px 32px;min-width:320px;max-width:420px;width:90%}
.modal h3{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:6px;color:var(--tx)}
.modal p{font-size:12.5px;color:var(--t2);margin-bottom:20px}
.modal input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:14px;outline:none;margin-bottom:14px;letter-spacing:.15em}
.modal input:focus{border-color:var(--acc)}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:var(--bg3);color:var(--t2);border:1px solid var(--bd);border-radius:6px;padding:7px 16px;cursor:pointer}
.btn-confirm{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;background:var(--acc2);color:#fff;border:1px solid var(--acc);border-radius:6px;padding:7px 16px;cursor:pointer}
.modal-err{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--red);margin-bottom:10px;display:none}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--bg2);border:1px solid var(--grn);color:var(--grn);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-radius:8px;padding:9px 20px;z-index:999;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.footer{position:relative;z-index:1;text-align:center;padding:22px;border-top:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
@media(max-width:600px){.hero{padding:44px 16px 32px}.topbar{padding:10px 16px}.subjects{padding:0 10px 60px}}
</style>
</head>
<body>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>🔒 Edit Mode</h3>
    <p>Enter your password to unlock editing.</p>
    <div class="modal-err" id="pw-err">Incorrect password — try again.</div>
    <input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closePwModal()">Cancel</button>
      <button class="btn-confirm" onclick="checkPw()">Unlock</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="topbar">
  <div class="topbar-brand"><span>🩺</span> Boards Study Hub</div>
  <div class="topbar-right">
    <div class="topbar-pill">Stage A · IM</div>
    <button id="edit-toggle-btn" onclick="clickEditBtn()">✏️ Edit</button>
  </div>
</div>

<div class="hero">
  <h1>Boards<br><em>Study Hub</em></h1>
  <div class="hero-name">Venos</div>
  <p class="hero-sub">Stage א — Internal Medicine · All your guides, one place.</p>
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-n" id="stat-guides">—</div><div class="hstat-l">Guides Ready</div></div>
    <div class="hstat"><div class="hstat-n" id="stat-subjects">9</div><div class="hstat-l">Subjects</div></div>
    <div class="hstat"><div class="hstat-n">A</div><div class="hstat-l">Stage</div></div>
  </div>
</div>

<div class="search-wrap">
  <span class="search-icon">🔍</span>
  <input class="search-box" type="text" placeholder="Search subjects or topics…" id="search-input" oninput="filterSubjects()">
</div>

<div class="subjects" id="subjects-container"></div>

<footer class="footer">Boards Study Hub · Stage A Internal Medicine · 2026</footer>

<script>
/* ══════════════════════════════════════════
   BOARDS STUDY HUB — v2 (Editable)
   Password: boards2026  (change below)
══════════════════════════════════════════ */

const PASSWORD = 'boards2026'; // ← CHANGE THIS TO YOUR OWN PASSWORD
const STORE_KEY = 'bsh_data_v3';
let editMode = false;

/* ── DEFAULT DATA ── */
const DEFAULT_DATA = {
  subjects: [
    {
      id: 'cardiology', name: 'Cardiology', icon: '❤️',
      topics: [
        { name: 'Stable Angina',              file: 'Stable_Angina_Boards_Guide.html' },
        { name: 'IHD — Night Before Review',  file: 'IHD_NightBefore_Review.html' },
        { name: 'NSTE-ACS',                   file: 'NSTE_ACS_boards_guide.html' },
        { name: 'STEMI',                      file: 'STEMI_boards_guide.html' },
        { name: 'Pericardial Disease',        file: 'pericardial_disease_boards_guide.html' },
        { name: 'Hypertension',               file: 'hypertension_boards_guide.html' }
      ]
    },
    {
      id: 'rheumatology', name: 'Rheumatology', icon: '🦴',
      topics: [
        { name: 'Gout', file: 'gout_boards_guide.html' },
        { name: 'Spondyloarthritis', file: 'spondyloarthritis_boards_guide.html' },
        { name: 'Rheumatoid Arthritis (RA)', file: 'RA_boards_guide.html' }
      ]
    },
    { id: 'nephrology',       name: 'Nephrology',         icon: '🫘', topics: [
        { name: 'Acute Kidney Injury (AKI)', file: 'AKI_master_review.html' },
        { name: 'Chronic Kidney Disease (CKD)', file: 'CKD_boards_guide_v2.html' },
        { name: 'Acid-Base Disorders', file: 'acid_base_boards_guide_LAST.html' },
        { name: 'Tubulointerstitial Disease', file: 'tubulointerstitial_boards_guide.html' },
        { name: 'Glomerular Diseases Part 1', file: 'glomerular_diseases_part1_boards_guide.html' },
        { name: 'Glomerular Diseases Part 2', file: 'glomerular_diseases_part2_boards_guide.html' }
      ] },
    { id: 'infectious',       name: 'Infectious Disease', icon: '🦠', topics: [
        { name: 'UTI',                        file: 'UTI_organized_guide.html' },
        { name: 'Acute Meningitis',           file: 'acute_meningitis_final.html' },
        { name: 'HIV',                        file: 'HIV_Boards_Guide.html' },
        { name: 'Infective Endocarditis',     file: 'Infective_Endocarditis_Study_Guide.html' },
        { name: 'Pneumonia',                  file: 'pneumonia_study_guide.html' },
        { name: 'Tuberculosis (TB)',           file: 'TB_boards_guide.html' }
      ] },
    { id: 'respiratory',      name: 'Respiratory',        icon: '🫁', topics: [
        { name: 'Respiratory Function & Diagnostics', file: 'respiratory_function_diagnostics_boards_guide.html' },
        { name: 'Respiratory Diseases', file: 'respiratory_boards_guide.html' }
      ] },
    { id: 'hematology',       name: 'Hematology',         icon: '🩸', topics: [] },
    { id: 'endocrinology',    name: 'Endocrinology',      icon: '⚗️', topics: [
        { name: 'Diabetes Mellitus Part 1',   file: 'DM_Part1_Teaching_Guide.html' },
        { name: 'Diabetes Mellitus Part 2',   file: 'DM_Part2_Management_Guide.html' },
        { name: 'Thyroid Disorders',          file: 'thyroid_boards_guide.html' }
      ] },
    { id: 'gastroenterology', name: 'Gastroenterology',   icon: '🫄', topics: [
        { name: 'Inflammatory Bowel Disease (IBD)', file: 'IBD_Review_Highlighted.html' }
      ] },
    {
      id: 'hepatology', name: 'Hepatology', icon: '🫀',
      topics: [
        { name: 'Alcoholic Liver Disease (ALD)',      file: 'ALD_boards_guide.html' },
        { name: 'MASLD / MASH',                      file: 'MASLD_MASH_boards_guide.html' },
        { name: 'Toxic & Drug-Induced Hepatitis',     file: 'toxic_drug_induced_hepatitis_boards_guide.html' }
      ]
    }
  ]
};

/* ── LOAD / SAVE ── */
function loadData() {
  try {
    const saved = localStorage.getItem(STORE_KEY);
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_DATA));
  } catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData(data) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch(e) {}
}
let DATA = loadData();

/* ── RENDER ALL ── */
function render() {
  const container = document.getElementById('subjects-container');
  container.innerHTML = '';

  DATA.subjects.forEach((subj, si) => {
    const div = document.createElement('div');
    div.className = 'subject';
    div.dataset.si = si;

    const hasTopics = subj.topics.length > 0;
    const countLabel = hasTopics ? `${subj.topics.length} topic${subj.topics.length>1?'s':''}` : '0 topics';

    let topicsHTML = '';
    if (subj.topics.length === 0) {
      topicsHTML = `<div class="empty-topics">No topics yet${editMode?' — add one below':'…'}</div>`;
    } else {
      subj.topics.forEach((t, ti) => {
        topicsHTML += `
          <a class="topic-link" href="${t.file}" target="_blank">
            <span class="tl-name">${t.name}</span>
            <span class="tl-badge">Ready</span>
            <button class="del-btn" title="Remove this topic" onclick="deleteTopic(event,${si},${ti})">×</button>
          </a>`;
      });
    }

    const editBarHTML = `
      <div class="edit-bar">
        <input class="inp-name" type="text" placeholder="Topic name (e.g. Heart Failure)" id="inp-name-${si}">
        <input class="inp-file" type="text" placeholder="filename.html" id="inp-file-${si}">
        <button class="btn-add" onclick="addTopic(${si})">+ Add Topic</button>
      </div>`;

    div.innerHTML = `
      <div class="subject-hd" onclick="toggleSubject(this)">
        <div class="subject-icon">${subj.icon}</div>
        <div class="subject-name">${subj.name}</div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="topic-count${hasTopics?' has':''}">${countLabel}</span>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="topics">${topicsHTML}</div>
      ${editBarHTML}
    `;

    container.appendChild(div);
  });

  if (editMode) {
    document.body.classList.add('edit-mode');
    document.querySelectorAll('.subject').forEach(s => s.classList.add('open'));
  } else {
    document.body.classList.remove('edit-mode');
    // open first subject with topics by default
    const firstWithTopics = DATA.subjects.find(s => s.topics.length > 0);
    if (firstWithTopics) {
      const idx = DATA.subjects.indexOf(firstWithTopics);
      document.querySelectorAll('.subject')[idx]?.classList.add('open');
    }
  }

  updateStats();
}

/* ── TOGGLE ACCORDION ── */
function toggleSubject(hd) {
  if (editMode) return; // in edit mode all stay open
  hd.closest('.subject').classList.toggle('open');
}

/* ── ADD TOPIC ── */
function addTopic(si) {
  const nameEl = document.getElementById(`inp-name-${si}`);
  const fileEl = document.getElementById(`inp-file-${si}`);
  const name = nameEl.value.trim();
  const file = fileEl.value.trim();
  if (!name) { nameEl.focus(); showToast('Enter a topic name'); return; }
  if (!file) { fileEl.focus(); showToast('Enter the filename'); return; }
  const cleanFile = file.endsWith('.html') ? file : file + '.html';
  DATA.subjects[si].topics.push({ name, file: cleanFile });
  saveData(DATA);
  render();
  showToast('Topic added ✓');
}

/* ── DELETE TOPIC ── */
function deleteTopic(e, si, ti) {
  e.preventDefault(); e.stopPropagation();
  if (!editMode) return;
  const name = DATA.subjects[si].topics[ti].name;
  if (!confirm(`Remove "${name}"?`)) return;
  DATA.subjects[si].topics.splice(ti, 1);
  saveData(DATA);
  render();
  showToast('Topic removed');
}

/* ── EDIT BUTTON ── */
function clickEditBtn() {
  if (editMode) { exitEditMode(); return; }
  document.getElementById('pw-modal').classList.add('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

/* ── PASSWORD CHECK ── */
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === PASSWORD) {
    closePwModal();
    enterEditMode();
  } else {
    document.getElementById('pw-err').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
function closePwModal() {
  document.getElementById('pw-modal').classList.remove('show');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-err').style.display = 'none';
}

/* ── EDIT MODE ── */
function enterEditMode() {
  editMode = true;
  const btn = document.getElementById('edit-toggle-btn');
  btn.textContent = '✅ Done Editing';
  btn.classList.add('active');
  render();
  showToast('Edit mode ON — add or remove topics');
}
function exitEditMode() {
  editMode = false;
  const btn = document.getElementById('edit-toggle-btn');
  btn.textContent = '✏️ Edit';
  btn.classList.remove('active');
  render();
  showToast('Changes saved ✓');
}

/* ── SEARCH ── */
function filterSubjects() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  document.querySelectorAll('.subject').forEach(subj => {
    if (!q) { subj.classList.remove('hidden-search'); return; }
    const si = parseInt(subj.dataset.si);
    const s = DATA.subjects[si];
    const match = s.name.toLowerCase().includes(q) || s.topics.some(t => t.name.toLowerCase().includes(q));
    subj.classList.toggle('hidden-search', !match);
    if (match && !editMode) subj.classList.add('open');
  });
}

/* ── STATS ── */
function updateStats() {
  const total = DATA.subjects.reduce((a, s) => a + s.topics.length, 0);
  document.getElementById('stat-guides').textContent = total || '—';
  document.getElementById('stat-subjects').textContent = DATA.subjects.length;
}

/* ── TOAST ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

/* ── CLOSE MODAL ON OVERLAY CLICK ── */
document.getElementById('pw-modal').addEventListener('click', function(e) {
  if (e.target === this) closePwModal();
});

/* ── KEYBOARD SHORTCUT: ESC closes modal ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePwModal();
});

/* ── INIT ── */
render();
</script>
</body>
</html>
